name: Daily scrape

on:
  schedule:
    # 06:00 HST = 16:00 UTC
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Scrape all councils
        run: |
          python -m tracker.legislative scrape --council all > scrape.json
          cat scrape.json

      - name: Compute diff vs prior run
        run: |
          python -m tracker.legislative diff --output diff.json
          python -c "import json; d=json.load(open('diff.json')); print(f'New: {len(d[\"new\"])} / Updated: {len(d[\"updated\"])}')"

      - name: Notify Slack
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        run: python -m tracker.legislative notify --diff diff.json

      - name: Build static site
        run: python site_build.py

      - name: Commit updates
        run: |
          git config user.name "tracker-bot"
          git config user.email "tracker-bot@users.noreply.github.com"
          git add data/bills.db site/bills.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          NEW=$(python -c "import json; d=json.load(open('diff.json')); print(len(d['new']))")
          UPD=$(python -c "import json; d=json.load(open('diff.json')); print(len(d['updated']))")
          git commit -m "scrape: $NEW new, $UPD updated"
          git push
